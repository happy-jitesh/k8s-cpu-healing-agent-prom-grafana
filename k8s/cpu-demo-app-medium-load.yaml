apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-demo-app
  namespace: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cpu-demo-app

  template:
    metadata:
      labels:
        app: cpu-demo-app

    spec:
      containers:
      - name: cpu-demo

        image: busybox

        command:
        - /bin/sh
        - -c
        - |
          while true; do
            yes > /dev/null &
            sleep 5
            pkill yes
            sleep 5
          done

        resources:
          requests:
            cpu: 100m

          limits:
            cpu: 200m