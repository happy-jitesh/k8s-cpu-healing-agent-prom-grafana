apiVersion: monitoring.coreos.com/v1

kind: ServiceMonitor

metadata:
  name: cpu-demo-monitor
  namespace: monitoring

  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: cpu-demo-app

  namespaceSelector:
    matchNames:
      - prod

  endpoints:
  - port: http
    interval: 10s